global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: machineguard-api

    metrics_path: /metrics

    static_configs:
      - targets:
          - api:8000

  - job_name: prometheus

    static_configs:
      - targets:
          - localhost:9090