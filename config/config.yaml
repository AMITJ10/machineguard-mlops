project:
  name: machineguard
  random_state: 42

data:
  raw_path: data/raw/ai4i2020.csv
  processed_path: data/processed/machine_data.csv
  reference_path: data/reference/reference.csv
  current_path: data/current/current.csv
  target_column: machine_failure
  test_size: 0.20
  validation_size: 0.20

model:
  threshold: 0.50

training:
  n_estimators: 300
  max_depth: null
  min_samples_split: 2

quality_gate:
  minimum_roc_auc: 0.95
  minimum_pr_auc: 0.80
  minimum_recall: 0.75
  minimum_precision: 0.70
  maximum_log_loss: 0.15
  maximum_business_cost: 2000000

mlflow:
  tracking_uri: sqlite:///mlflow.db
  experiment_name: predictive-maintenance

registry:
  model_name: MachineGuardFailureClassifier
  candidate_alias: candidate
  champion_alias: champion

storage:
  provider: local
  bucket_name: machineguard-mlops-artifacts